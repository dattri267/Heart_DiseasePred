<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <title>Heart Disease Prediction</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>



    <!-- HERO SECTION -->

    <section class="hero">

        <div class="container">

            <div class="row align-items-center">

                <div class="col-lg-6">

                    <h1>AI Heart Disease Prediction</h1>

                    <p class="lead">

                        Predict heart disease risk using a Machine Learning model trained on clinical patient records.

                    </p>

                    <button id="startBtn" class="btn btn-danger btn-lg">

                        Start Prediction

                    </button>

                </div>

                <div class="col-lg-6 text-center">

                    <img src="https://images.unsplash.com/photo-1576091160550-2173dba999ef?w=900"
                        class="img-fluid hero-img">

                </div>

            </div>

        </div>

    </section>

    <!-- FORM SECTION -->

    <section id="prediction-section">

        <div class="container">

            <div class="card shadow-lg p-5">

                <h2 class="text-center mb-4">

                    Patient Information

                </h2>

                <form id="predictionForm">

                    <div class="row">

                        <div class="col-md-6 mb-3">

                            <label class="form-label">

                                Age

                            </label>

                            <input type="number" name="age" class="form-control" required>

                        </div>

                        <div class="col-md-6 mb-3">

                            <label class="form-label">

                                Gender

                            </label>

                            <select name="sex" class="form-select">

                                <option value="1">Male</option>
                                <option value="0">Female</option>

                            </select>

                        </div>

                        <div class="col-md-6 mb-3">

                            <label class="form-label">

                                Chest Pain Type

                            </label>

                            <select name="cp" class="form-select">

                                <option value="0">Typical Angina</option>
                                <option value="1">Atypical Angina</option>
                                <option value="2">Non-anginal Pain</option>
                                <option value="3">Asymptomatic</option>

                            </select>

                        </div>

                        <div class="col-md-6 mb-3">

                            <label class="form-label">

                                Resting Blood Pressure

                            </label>

                            <input type="number" name="trestbps" class="form-control" required>

                        </div>

                        <div class="col-md-6 mb-3">

                            <label class="form-label">

                                Cholesterol

                            </label>

                            <input type="number" name="chol" class="form-control" required>

                        </div>

                        <div class="col-md-6 mb-3">

                            <label class="form-label">

                                Fasting Blood Sugar > 120 mg/dL

                            </label>

                            <select name="fbs" class="form-select">

                                <option value="0">No</option>
                                <option value="1">Yes</option>

                            </select>

                        </div>

                        <div class="col-md-6 mb-3">

                            <label class="form-label">

                                Resting ECG

                            </label>

                            <select name="restecg" class="form-select">

                                <option value="0">Normal</option>
                                <option value="1">ST-T Abnormality</option>
                                <option value="2">Left Ventricular Hypertrophy</option>

                            </select>

                        </div>

                        <div class="col-md-6 mb-3">

                            <label class="form-label">

                                Maximum Heart Rate

                            </label>

                            <input type="number" name="thalach" class="form-control" required>

                        </div>

                        <div class="col-md-6 mb-3">

                            <label class="form-label">

                                Exercise Induced Angina

                            </label>

                            <select name="exang" class="form-select">

                                <option value="0">No</option>
                                <option value="1">Yes</option>

                            </select>

                        </div>

                        <div class="col-md-6 mb-3">

                            <label class="form-label">

                                ST Depression

                            </label>

                            <input type="number" step="0.1" name="oldpeak" class="form-control" required>

                        </div>

                        <div class="col-md-6 mb-3">

                            <label class="form-label">

                                Slope

                            </label>

                            <select name="slope" class="form-select">

                                <option value="0">Upsloping</option>
                                <option value="1">Flat</option>
                                <option value="2">Downsloping</option>

                            </select>

                        </div>

                        <div class="col-md-6 mb-3">

                            <label class="form-label">

                                Major Vessels

                            </label>

                            <select name="ca" class="form-select">

                                <option value="0">0</option>
                                <option value="1">1</option>
                                <option value="2">2</option>
                                <option value="3">3</option>

                            </select>

                        </div>

                        <div class="col-md-6 mb-4">

                            <label class="form-label">

                                Thalassemia

                            </label>

                            <select name="thal" class="form-select">

                                <option value="1">Normal</option>
                                <option value="2">Fixed Defect</option>
                                <option value="3">Reversible Defect</option>

                            </select>

                        </div>

                    </div>

                    <div class="text-center">

                        <button class="btn btn-danger btn-lg" type="submit">

                            Predict Risk

                        </button>

                    </div>

                </form>

                <hr class="my-5">

                <div id="resultCard" class="card shadow-lg p-4 text-center" style="display:none;">

                    <h3 id="resultTitle"></h3>

                    <h1 id="resultIcon" style="font-size:70px;">
                    </h1>

                    <h4 id="resultProbability"></h4>

                    <div class="progress mt-4">

                        <div id="probabilityBar" class="progress-bar" style="width:0%;">

                            0%

                        </div>

                    </div>

                    <p id="recommendation" class="mt-4 fs-5">
                    </p>

                    <button id="resetBtn" class="btn btn-outline-danger mt-3">

                        Predict Another Patient

                    </button>

                </div>

            </div>

        </div>

    </section>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>

</html>
